name: Analyze Sample Video

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  analyze-sample:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile project
        run: python -m compileall .

      - name: Confirm sample video exists
        run: |
          ls -lah sample_videos
          test -f sample_videos/lunge.mp4

      - name: Run analyzer on sample video
        run: python analyze_lunge.py --video sample_videos/lunge.mp4 --output output

      - name: Print report
        run: cat output/report.json

      - name: Validate required semantic metrics
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path('output/report.json')
          if not report_path.exists():
              raise SystemExit('output/report.json was not generated')

          data = json.loads(report_path.read_text())
          metrics = data.get('metrics', {})
          required = [
              'movement_segments',
              'selected_lunge_score',
              'hand_starts_before_foot_in_lunge',
              'post_landing_torso_drift',
          ]
          missing = [k for k in required if k not in metrics]
          if missing:
              raise SystemExit(f'Missing required metrics in report.json: {missing}')
          print('Required metrics present in output/report.json')
          PY
